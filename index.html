<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f4b38" />
  <meta name="description" content="B2B Industrial Solutions lead form" />
  <title>Connect with us | B2B Industrial Solutions</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page-shell">
    <a class="brand" href="https://b2bindustrial.in/" aria-label="B2B Industrial Solutions home">
      <img src="logo.webp" alt="B2B Industrial Solutions" class="brand-logo"
        onerror="this.hidden=true; this.nextElementSibling.hidden=false;" />
      <span class="brand-fallback" hidden>B2B Industrial Solutions</span>
    </a>

    <section class="quest-card" aria-labelledby="quest-title">
      <div class="quest-heading">
        <p class="eyebrow">B2B INDUSTRIAL SOLUTIONS</p>
        <h1 id="quest-title">Connect with us</h1>
        <p>Share your details to access the resource and stay connected with our team.</p>
      </div>

      <ol class="progress" aria-label="Form progress">
        <li class="is-active"><span>1</span><b>Name</b></li>
        <li><span>2</span><b>Work</b></li>
        <li><span>3</span><b>Contact</b></li>
      </ol>

      <form id="leadForm" action="https://api.web3forms.com/submit" method="POST" novalidate>
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY" />
        <input type="hidden" name="subject" value="New B2B Industrial Solutions Contact" />
        <input type="hidden" name="from_name" value="B2B Industrial Solutions" />
        <input type="checkbox" name="botcheck" class="botcheck" tabindex="-1" autocomplete="off" />

        <fieldset>
          <div class="fields-grid">
            <div class="field">
              <label for="name">Name</label>
              <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name" required />
              <p class="field-error" data-error-for="name"></p>
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" placeholder="name@company.com"
                required />
              <p class="field-error" data-error-for="email"></p>
            </div>

            <div class="field">
              <label for="designation">Role</label>
              <input id="designation" name="designation" type="text" autocomplete="organization-title"
                placeholder="Your role" required />
              <p class="field-error" data-error-for="designation"></p>
            </div>

            <div class="field">
              <label for="company">Company</label>
              <input id="company" name="company" type="text" autocomplete="organization" placeholder="Company name"
                required />
              <p class="field-error" data-error-for="company"></p>
            </div>

            <div class="field">
              <label for="phone">Contact number</label>
              <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="+91 98765 43210" required />
              <p class="field-error" data-error-for="phone"></p>
            </div>

            <div class="field field-full">
              <label for="message">Note <span>(optional)</span></label>
              <textarea id="message" name="message" rows="3" placeholder="Anything else?"></textarea>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <button class="submit-button" type="submit" id="submitButton">
            <span class="button-text">Continue</span>
            <span class="button-loader" aria-hidden="true"></span>
          </button>
        </div>

        <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>

</html>
